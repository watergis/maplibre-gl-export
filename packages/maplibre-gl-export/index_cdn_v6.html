<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>MapLibre GL JS v6 example</title>
		<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/github-fork-ribbon-css/0.2.3/gh-fork-ribbon.min.css"
		/>
		<script type="importmap">
			{
				"imports": {
					"maplibre-gl": "https://unpkg.com/maplibre-gl@^6.0.0/dist/maplibre-gl.mjs"
				}
			}
		</script>
		<link href="https://unpkg.com/maplibre-gl@^6.0.0/dist/maplibre-gl.css" rel="stylesheet" />

		<link href="./dist/maplibre-gl-export.css" rel="stylesheet" />

		<style>
			body {
				margin: 0;
				padding: 0;
			}
			#map {
				position: absolute;
				top: 0;
				bottom: 0;
				width: 100%;
				z-index: 10;
			}
		</style>
	</head>
	<body>
		<a
			class="github-fork-ribbon left-top"
			href="https://github.com/watergis/maplibre-gl-export"
			data-ribbon="Fork me on GitHub"
			title="Fork me on GitHub"
			>Fork me on GitHub</a
		>
		<div id="map"></div>
		<script type="module">
			import { Map } from 'maplibre-gl';
			import {
				DPI,
				Format,
				MaplibreExportControl,
				PageOrientation,
				Size
			} from './dist/maplibre-gl-export.es.js';

			const map = new Map({
				container: 'map',
				style: 'https://demotiles.maplibre.org/style.json',
				center: [0, 0],
				zoom: 1
			});
			map.addControl(
				new MaplibreExportControl({
					PageSize: Size.A4,
					PageOrientation: PageOrientation.Landscape,
					Format: Format.PNG,
					DPI: DPI[300],
					Crosshair: true,
					PrintableArea: true,
					Local: 'en'
				}),
				'top-right'
			);
		</script>
	</body>
</html>
