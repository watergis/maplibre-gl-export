# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Build

on:
  push:
    branches: [ main ]
  pull_request:

env:
  CI: true
  PNPM_CACHE_FOLDER: .pnpm-store

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
    - uses: actions/checkout@v7
    - uses: pnpm/action-setup@v5.0.0
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: pnpm
    - name: install dependencies
      run: pnpm install --frozen-lockfile

    - run: pnpm lint

    - name: build
      env: 
        PUBLIC_MAPBOX_ACCESSTOKEN: ${{ secrets.PUBLIC_MAPBOX_ACCESSTOKEN }}
      run: 
        pnpm build

  maplibre-compatibility:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        maplibre-version:
          - ^5.21.1
          - ">=6.0.0-0 <7.0.0"

    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v5.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Use MapLibre GL JS ${{ matrix.maplibre-version }}
        working-directory: packages/maplibre-gl-export
        run: pnpm add --save-dev --lockfile=false "maplibre-gl@${{ matrix.maplibre-version }}"
      - name: Build MapLibre package
        working-directory: packages/maplibre-gl-export
        run: pnpm build:js
